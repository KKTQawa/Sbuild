name: Build & Release

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 📄 读取版本（mod_version = 1.1.0）
      - name: Read version
        uses: BrycensRanch/read-properties-action@v1
        id: version
        with:
          file: gradle.properties
          property: mod_version
          default: 1.0.0

      # ☕ Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔐 gradlew 权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 🧬 datagen
      - name: Run Datagen
        run: ./gradlew runData

      # 🔨 build
      - name: Build
        run: ./gradlew build

      # 📦 上传 artifact（调试用）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbuild-${{ steps.version.outputs.value }}
          path: build/libs/*.jar

      # 🚀 GitHub Release（只在 tag 时执行）
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: sbuild ${{ steps.version.outputs.value }}
          files: |
            build/libs/sbuild-1.20.1-forge-${{ steps.version.outputs.value }}.jar
            build/libs/sbuild-1.20.1-forge-${{ steps.version.outputs.value }}-sources.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}